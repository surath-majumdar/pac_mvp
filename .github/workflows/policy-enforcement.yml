name: Infrastructure Policy Enforcement

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]
    workflow_dispatch:
        inputs:
            manifest_to_test:
                description: 'Select the manifest to evaluate'
                required: true
                default: 'manifests/topics.yaml'
                type: choice
                options:
                    - manifests/golden-cluster.yaml
                    - manifests/rogue-cluster.yaml
                    - manifests/topics.yaml

jobs:
    Phase2-evaluate-only:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v5

            - name: Install Conftest (Linux x86_64)
              run: |
                CONFTEST_VERSION=$(curl -s https://api.github.com/repos/open-policy-agent/conftest/releases/latest | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
                wget "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
                tar xzf "conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
                sudo mv conftest /usr/local/bin/conftest
                conftest --version
                
            # UPDATED: Run tests against the new structured directories
            - name: Debug CI Environment
              run: |
                    echo "Files in policy_mandates:"
                    ls -R policy_mandates/
                    echo "Running trace in CI:"
                    conftest verify -p policy_enforcement/ --data policy_mandates/ --trace

            - name: Run Policy Unit Tests
              run: conftest verify -p policy_enforcement/ --data policy_mandates/
              
            - name: Hydrate ITSM Data (SNOW Mock)
              run: |
                echo "Initiating simulated ServiceNow API request..."
                # NOTE: Ensure this folder is included in your --data path or is part of policy_mandates/
                mkdir -p policy_mandates/itsm
                cat << 'EOF' > policy_mandates/itsm/itsm_state.json
                {
                  "itsm_state": {
                    "approved_tickets": {
                      "CHG-00015": {
                        "max_partitions": 15
                      }
                    }
                  }
                }
                EOF
                echo "Data hydration complete."

            # UPDATED: Evaluate Manifest using domain-separated directories
            - name: Evaluate Manifest
              run: |
                TARGET="${{ github.event.inputs.manifest_to_test }}"
                if [ -z "$TARGET" ]; then TARGET="manifests/"; fi
                
                # Point to the Enforcement (Policies) folder and Mandates (Data) folder
                # Conftest will automatically merge all JSONs found in policy_mandates/
                conftest test "$TARGET" -p policy_enforcement/ --data policy_mandates/ --output github